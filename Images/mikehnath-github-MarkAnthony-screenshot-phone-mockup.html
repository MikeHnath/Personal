<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark Anthony — Mobile Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #957645;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 18px 20px 0;
    font-family: -apple-system, sans-serif;
  }

  .scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    transform: scale(0.46);
    transform-origin: top center;
  }


  .label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: rgba(255,255,255,.3);
  }

  /* Phone shell */
  .phone {
    position: relative;
    width: 340px;
    background: #1a1a1a;
    border-radius: 48px;
    padding: 14px;
    box-shadow:
      0 0 0 1px #2a2a2a,
      0 0 0 2px #111,
      0 40px 80px rgba(0,0,0,.7),
      inset 0 0 0 1px #333;
  }

  /* Side buttons */
  .phone::before {
    content: '';
    position: absolute;
    left: -3px;
    top: 100px;
    width: 3px;
    height: 32px;
    background: #2a2a2a;
    border-radius: 3px 0 0 3px;
    box-shadow: 0 44px 0 #2a2a2a, 0 84px 0 #2a2a2a;
  }
  .phone::after {
    content: '';
    position: absolute;
    right: -3px;
    top: 130px;
    width: 3px;
    height: 60px;
    background: #2a2a2a;
    border-radius: 0 3px 3px 0;
  }

  /* Screen area */
  .screen {
    background: #000;
    border-radius: 36px;
    overflow: hidden;
    position: relative;
  }

  /* Dynamic island */
  .island {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 32px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
  }

  /* Status bar */
  .status-bar {
    height: 52px;
    background: #1a1410;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 24px 8px;
    position: relative;
    z-index: 5;
    flex-shrink: 0;
  }
  .status-time {
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -.02em;
  }
  .status-icons {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .status-icons svg {
    width: 14px;
    height: 14px;
    fill: #fff;
  }

  /* Scrollable content */
  .scroll-container {
    height: 580px;
    overflow-y: scroll;
    overflow-x: hidden;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    cursor: grab;
  }
  .scroll-container:active { cursor: grabbing; }
  .scroll-container::-webkit-scrollbar { display: none; }

  .scroll-container img {
    display: block;
    width: 100%;
    height: auto;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* Home indicator */
  .home-indicator {
    height: 28px;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .home-bar {
    width: 130px;
    height: 4px;
    background: rgba(255,255,255,.25);
    border-radius: 2px;
  }

  /* Scroll hint */
  .scroll-hint {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,.6);
    color: rgba(255,255,255,.7);
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    pointer-events: none;
    transition: opacity .5s;
    white-space: nowrap;
    z-index: 20;
  }
  .scroll-hint.hidden { opacity: 0; }
</style>
</head>

<script>
  const scroller = document.getElementById('scroller');
  const hint = document.getElementById('hint');
  let isDragging = false, startY = 0, startScroll = 0;
  let hintHidden = false;

  scroller.addEventListener('scroll', () => {
    if (!hintHidden && scroller.scrollTop > 20) {
      hint.classList.add('hidden');
      hintHidden = true;
    }
  });

  // Mouse drag to scroll
  scroller.addEventListener('mousedown', (e) => {
    isDragging = true;
    startY = e.pageY;
    startScroll = scroller.scrollTop;
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    scroller.scrollTop = startScroll - (e.pageY - startY);
  });
  document.addEventListener('mouseup', () => { isDragging = false; });
</script>
