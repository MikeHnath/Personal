<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGIL — Kickstarter Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: transparent;
    font-family: -apple-system, sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .phone {
    position: relative;
    width: 340px;
    background: #1a1a1a;
    border-radius: 48px;
    padding: 14px;
    margin: 40px 3px;
    box-shadow:
      0 0 0 1px #2a2a2a,
      0 0 0 2px #111,
      0 40px 80px rgba(0,0,0,.35),
      inset 0 0 0 1px #333;
  }

  /* Side buttons */
  .phone::before {
    content: '';
    position: absolute;
    left: -3px;
    top: 100px;
    width: 3px;
    height: 32px;
    background: #2a2a2a;
    border-radius: 3px 0 0 3px;
    box-shadow: 0 44px 0 #2a2a2a, 0 84px 0 #2a2a2a;
  }
  .phone::after {
    content: '';
    position: absolute;
    right: -3px;
    top: 130px;
    width: 3px;
    height: 60px;
    background: #2a2a2a;
    border-radius: 0 3px 3px 0;
  }

  .screen {
    background: #000;
    border-radius: 36px;
    overflow: hidden;
    position: relative;
  }

  .island {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 32px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
  }

  .scroll-container {
    height: 640px;
    overflow-y: scroll;
    overflow-x: hidden;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    cursor: grab;
  }
  .scroll-container:active { cursor: grabbing; }
  .scroll-container::-webkit-scrollbar { display: none; }

  .scroll-container img {
    display: block;
    width: 100%;
    height: auto;
    user-select: none;
    -webkit-user-drag: none;
  }
</style>
</head>

<script>
  const scroller = document.getElementById('scroller');
  let isDragging = false, startY = 0, startScroll = 0;

  scroller.addEventListener('mousedown', (e) => {
    isDragging = true;
    startY = e.pageY;
    startScroll = scroller.scrollTop;
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    scroller.scrollTop = startScroll - (e.pageY - startY);
  });
  document.addEventListener('mouseup', () => { isDragging = false; });
</script>
